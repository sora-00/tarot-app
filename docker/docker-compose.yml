# tarot-app/docker/docker-compose.yml

version: '3.8'

services:
  db:
    image: postgres:15
    container_name: tarot-postgres
    restart: always
    environment:
      POSTGRES_USER: tarot_user
      POSTGRES_PASSWORD: tarot_pass
      POSTGRES_DB: tarot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../packages/backend
      dockerfile: Dockerfile
    container_name: tarot-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=tarot_user
      - DB_PASSWORD=tarot_pass
      - DB_NAME=tarot_db
      - DB_PORT=5432
    depends_on:
      - db

  frontend:
    build:
      context: ../packages/frontend
      dockerfile: Dockerfile
    container_name: tarot-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
